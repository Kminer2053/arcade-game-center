<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 in 1 Arcade Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg-deep: #0d140a;
            --bg-mid: #121c0b;
            --bg-glow: #233c15;
            --accent-lime: #6af425;
            --accent-cyan: #5de1ff;
            --accent-pink: #ff4fd8;
            --card: rgba(22, 34, 16, 0.82);
            --card-border: rgba(106, 244, 37, 0.2);
            --text-main: #f8faf5;
            --text-muted: #b9c4b0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Spline Sans", "Segoe UI", sans-serif;
            text-align: center;
            background: radial-gradient(circle at top, rgba(106, 244, 37, 0.16), transparent 45%),
                radial-gradient(circle at 20% 20%, rgba(255, 79, 216, 0.18), transparent 40%),
                linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
            color: var(--text-main);
            margin: 0;
            padding: 24px 18px 56px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: min(1000px, 100%);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            padding: 18px 16px;
            border-radius: 18px;
            background: rgba(16, 24, 12, 0.7);
            border: 1px solid rgba(106, 244, 37, 0.15);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-family: "Bungee", "Spline Sans", sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 0 0 18px rgba(106, 244, 37, 0.4), 0 0 30px rgba(255, 79, 216, 0.35);
        }

        header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        #lobby.game-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
        }

        #lobby button {
            padding: 18px 18px 22px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid var(--card-border);
            border-radius: 18px;
            cursor: pointer;
            background: linear-gradient(150deg, rgba(20, 30, 14, 0.95), rgba(12, 18, 10, 0.95));
            color: var(--text-main);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.3), inset 0 0 18px rgba(106, 244, 37, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            text-align: left;
        }

        #lobby button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 22px 34px rgba(0, 0, 0, 0.4), inset 0 0 26px rgba(106, 244, 37, 0.15);
            border-color: rgba(106, 244, 37, 0.5);
        }

        .game-card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 6px 0 6px;
        }

        .game-card-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 14px;
        }

        .game-card-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent-lime);
            color: #0b1407;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #game-container {
            display: none;
            margin-top: 8px;
            background: var(--card);
            border-radius: 22px;
            border: 1px solid var(--card-border);
            padding: 22px;
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.4);
        }

        #status-panel {
            background: rgba(16, 24, 12, 0.75);
            border: 1px solid rgba(106, 244, 37, 0.2);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
        }

        #status-panel h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .status-line {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        #next-goal {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        canvas {
            background: #0a1207;
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 0 22px rgba(106, 244, 37, 0.18);
        }

        .controls {
            display: none;
            margin-top: 12px;
        }

        .controls button {
            padding: 10px 18px;
            margin: 6px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
        }

        #back-button {
            margin-top: 16px;
            padding: 12px 20px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(120deg, #6af425, #9cff6a);
            color: #0b1407;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 14px 24px rgba(106, 244, 37, 0.25);
        }

        @media (min-width: 720px) {
            body {
                padding: 48px 32px 64px;
            }

            #game-container {
                padding: 28px;
            }

            #lobby.game-menu {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <h1>Arcade Time</h1>
            <p>세 가지 클래식 게임을 한 곳에서 즐겨보세요.</p>
        </header>

        <div id="lobby" class="game-menu">
            <button onclick="startGame('tetris')">
                <div class="game-card-title">Tetris</div>
                <div class="game-card-subtitle">라인을 완성해 점수를 올려요</div>
                <div class="game-card-cta">Play Now</div>
            </button>
            <button onclick="startGame('snake')">
                <div class="game-card-title">Snake</div>
                <div class="game-card-subtitle">빠르게 성장하는 스네이크</div>
                <div class="game-card-cta">Play Now</div>
            </button>
            <button onclick="startGame('2048')">
                <div class="game-card-title">2048</div>
                <div class="game-card-subtitle">타일을 합쳐 최고 점수 도전</div>
                <div class="game-card-cta">Play Now</div>
            </button>
        </div>
        
        <div id="game-container">
            <div id="status-panel">
                <h2 id="game-title">Game</h2>
                <div class="status-line">
                    <span>Score: <span id="score">0</span></span>
                    <span>High Score: <span id="highscore">0</span></span>
                </div>
                <p id="next-goal">Select a game to begin</p>
            </div>
            <canvas id="gameCanvas" width="300" height="400"></canvas>
            <div id="mobile-controls" class="controls">
                <!-- Controls will be injected based on game type -->
            </div>
            <button id="back-button" onclick="backToLobby()">Back to Lobby</button>
        </div>
    </div>

    <script src="public/js/main.js"></script>
</body>
</html>
